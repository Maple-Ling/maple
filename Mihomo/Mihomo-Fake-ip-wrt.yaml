# 全局配置 
secret: "188271"
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
external-controller: 0.0.0.0:9090
external-ui: ui
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
hosts:
  "fn.maple521.cc.cd": 192.168.1.200

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

# 入站
tun:
  enable: false
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: []
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:cn_domain,private_domain,rule-direct_domain"
    # Cloudflare 验证相关
    - "*.challenges.cloudflare.com"
    - "*.captcha.cloudflare.com"
    - "*.hcaptcha.com"
    - "*.recaptcha.net"

proxy-providers:
  自建:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 86400
    proxy: 🚅 直连
    url: ""

  cfvless:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 86400
    proxy: 🚅 直连
    url: ""

  MJJ:
    type: http
    interval: 0
    health-check:
      enable: false
      url: https://www.gstatic.com/generate_204
      interval: 0
    proxy: 🚅 直连
    url: ""
  
proxies:
  - name: "🚅 直连"
    type: direct
    udp: true

pr: &pr {type: select, proxies: [🛸 代理, 🇯🇵 日本手动, 🇺🇸 美国手动, 🇰🇷 韩国手动, 🇸🇬 新加坡手动, 🇭🇰 香港手动, 🇨🇳 台湾手动, 🚅 直连]}

proxy-groups:
  - {name: 🛸 代理, type: select, proxies: [🇯🇵 日本手动, 🇺🇸 美国手动, 🇰🇷 韩国手动, 🇸🇬 新加坡手动, 🇭🇰 香港手动, 🇨🇳 台湾手动, 🚅 直连]}
  - {name: 🇯🇵 日本手动, type: select, include-all: true, filter: "(?i)日|jp|japan"}
  - {name: 🇺🇸 美国手动, type: select, include-all: true, filter: "(?i)美|us"}
  - {name: 🇰🇷 韩国手动, type: select, include-all: true, filter: "(?i)韩|kr"}
  - {name: 🇸🇬 新加坡手动, type: select, include-all: true, filter: "(?i)新|sg"}
  - {name: 🇭🇰 香港手动, type: select, include-all: true, filter: "(?i)港|hk"}
  - {name: 🇨🇳 台湾手动, type: select, include-all: true, filter: "(?i)台|tw"}
  - {name: 📲 Telegram, !!merge <<: *pr}
  - {name: 👀 Google, !!merge <<: *pr}
  - {name: 🛸 容器, !!merge <<: *pr}
  - {name: 🎮 Steam, !!merge <<: *pr}
  - {name: 🎮 腾讯, !!merge <<: *pr}
  - {name: 🤖 ChatGPT, !!merge <<: *pr}
  - {name: 🎵 TikTok, !!merge <<: *pr}
  - {name: 🚧 兜底, !!merge <<: *pr}

# 规则部分 (已修正语法)
rules:
  # 1. 私有网络和国内IP/域名优先
  - RULE-SET, private_domain, 🚅 直连
  - RULE-SET, private_ip, 🚅 直连, no-resolve
  - RULE-SET, cn_ip, 🚅 直连, no-resolve
  - RULE-SET, cn_domain, 🚅 直连
  - RULE-SET, rule-direct_domain, 🚅 直连
  
  # 3. 其他服务规则
  - RULE-SET, rule-proxy_domain, 🛸 代理
  - RULE-SET, telegram_domain, 📲 Telegram
  - RULE-SET, telegram_ip, 📲 Telegram, no-resolve
  - RULE-SET, google_domain, 👀 Google
  - RULE-SET, google_ip, 👀 Google, no-resolve
  - RULE-SET, youtube_domain, 👀 Google
  - RULE-SET, docker_domain, 🛸 容器
  - RULE-SET, openai, 🤖 ChatGPT
  - RULE-SET, steam, 🎮 Steam
  - RULE-SET, tiktok_domain, 🎵 TikTok
  - RULE-SET, tencent, 🎮 腾讯
  - RULE-SET, tencent-games, 🎮 腾讯
  
  # 4. 地理位置规则
  - RULE-SET, geolocation-cn, 🚅 直连
  - GEOIP, CN, 🚅 直连, no-resolve
  - RULE-SET, geolocation-!cn, 🛸 代理
  
  # 5. 最终规则
  - MATCH, 🚧 兜底

